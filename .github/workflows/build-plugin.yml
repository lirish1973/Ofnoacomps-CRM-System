name: Auto-Update Plugin Manifest

# Safety net: runs when PHP files OR plugin assets change.
# Skips entirely if plugin-updates.json already has the correct version
# (meaning release.bat already did the work).
# Uses git pull --rebase before push to handle any race conditions.

on:
  push:
    branches: [main]
    paths:
      - 'wordpress-plugin/ofnoacomps-crm/**/*.php'
      - 'wordpress-plugin/ofnoacomps-crm/*.php'
      - 'wordpress-plugin/ofnoacomps-crm/assets/**'
      - 'wordpress-plugin/ofnoacomps-crm/assets/*.js'
      - 'wordpress-plugin/ofnoacomps-crm/assets/*.css'

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract plugin version
        id: meta
        run: |
          VERSION=$(grep -m1 "OFNOACOMPS_CRM_VERSION" \
            wordpress-plugin/ofnoacomps-crm/ofnoacomps-crm.php \
            | grep -oP "'\K[0-9.]+")
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract version"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "today=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if manifest already up to date
        id: check
        run: |
          MANIFEST_VER=$(python3 -c "import json; d=json.load(open('plugin-updates.json')); print(d['ofnoacomps-crm']['version'])")
          PHP_VER="${{ steps.meta.outputs.version }}"
          echo "Manifest: $MANIFEST_VER | PHP: $PHP_VER"
          if [ "$MANIFEST_VER" = "$PHP_VER" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Manifest already at $PHP_VER — skipping (release.bat already ran)."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Manifest is behind ($MANIFEST_VER < $PHP_VER) — will update."
          fi

      - name: Build plugin ZIP
        if: steps.check.outputs.skip == 'false'
        run: |
          cd wordpress-plugin
          rm -f ofnoacomps-crm.zip
          zip -r ofnoacomps-crm.zip ofnoacomps-crm/ \
            --exclude "*.DS_Store" --exclude "*Thumbs.db" --exclude "*.log"
          echo "ZIP: $(du -h ofnoacomps-crm.zip | cut -f1)"

      - name: Update plugin-updates.json
        if: steps.check.outputs.skip == 'false'
        run: |
          python3 - <<'PYEOF'
          import json, os
          with open('plugin-updates.json', 'r', encoding='utf-8') as f:
              m = json.load(f)
          m['ofnoacomps-crm']['version']      = os.environ['PLUGIN_VERSION']
          m['ofnoacomps-crm']['last_updated'] = os.environ['TODAY']
          m['ofnoacomps-crm']['download_url'] = (
              'https://github.com/lirish1973/Ofnoacomps-CRM-System'
              '/raw/main/wordpress-plugin/ofnoacomps-crm.zip')
          with open('plugin-updates.json', 'w', encoding='utf-8') as f:
              json.dump(m, f, ensure_ascii=False, indent=2)
          print(f"Updated manifest to {os.environ['PLUGIN_VERSION']}")
          PYEOF
        env:
          PLUGIN_VERSION: ${{ steps.meta.outputs.version }}
          TODAY:          ${{ steps.meta.outputs.today }}

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wordpress-plugin/ofnoacomps-crm.zip plugin-updates.json
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "auto: build ofnoacomps-crm v${{ steps.meta.outputs.version }} [skip ci]"
            # Pull rebase first to avoid rejection if release.bat pushed in parallel
            git pull --rebase origin main
            git push origin main
            echo "Pushed."
          fi
